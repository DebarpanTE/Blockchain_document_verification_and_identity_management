<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chain Explorer — BlockID</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root { --bg:#020608;--surface:#0a1018;--surface2:#111a24;--accent:#00e5ff;--accent2:#7c3aed;--accent3:#10b981;--text:#e2f0f7;--muted:#4a6070;--border:#1a2d3d; }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  body::before{content:'';position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(0,229,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.03) 1px,transparent 1px);background-size:48px 48px;pointer-events:none}
  nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;background:rgba(2,6,8,0.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
  .logo{font-family:'Space Mono',monospace;font-size:1.2rem;font-weight:700;color:var(--accent);text-decoration:none;display:flex;align-items:center;gap:0.5rem}
  .logo-icon{width:28px;height:28px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:5px;display:flex;align-items:center;justify-content:center}
  .btn{display:inline-flex;align-items:center;gap:0.4rem;padding:0.5rem 1rem;border-radius:6px;font-family:'Syne',sans-serif;font-weight:600;font-size:0.85rem;cursor:pointer;transition:all .2s;border:none;text-decoration:none}
  .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
  .btn-ghost:hover{color:var(--text);border-color:var(--accent)}
  .container{max-width:1100px;margin:0 auto;padding:2rem}
  h1{font-size:2rem;font-weight:800;letter-spacing:-1px;margin-bottom:0.5rem}
  .sub{color:var(--muted);margin-bottom:2rem}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-bottom:2rem}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.1rem 1.25rem}
  .stat-label{font-size:0.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.35rem}
  .stat-val{font-family:'Space Mono',monospace;font-size:1.8rem;font-weight:700;line-height:1}
  .accent{color:var(--accent)}.green{color:var(--accent3)}.purple{color:var(--accent2)}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:1.5rem}
  .card-header{padding:1.1rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
  .card-title{font-weight:700;font-size:.95rem}
  .card-body{padding:1.25rem}
  .block-item{display:flex;align-items:center;gap:1rem;padding:.875rem;border:1px solid var(--border);border-radius:9px;margin-bottom:.6rem;cursor:pointer;transition:all .2s}
  .block-item:hover{border-color:var(--accent);background:rgba(0,229,255,0.04)}
  .block-num{width:44px;height:44px;border-radius:8px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:.8rem;font-weight:700;color:var(--accent);flex-shrink:0}
  .font-mono{font-family:'Space Mono',monospace}.text-xs{font-size:.72rem}.text-sm{font-size:.875rem}.text-muted{color:var(--muted)}
  .tag{padding:.2rem .5rem;border-radius:4px;font-size:.7rem;font-weight:600}
  .tag-muted{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
  .spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .detail-panel{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:1.25rem;margin-top:1rem;display:none}
  .tx-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.875rem;margin-bottom:.5rem}
  .tx-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem}
  .tag-purple{background:rgba(124,58,237,.15);color:#a78bfa}
  .tag-green{background:rgba(16,185,129,.15);color:var(--accent3)}
  .hash-display{font-family:'Space Mono',monospace;font-size:.65rem;word-break:break-all;color:var(--accent);background:var(--surface);padding:.5rem .75rem;border-radius:6px;margin:.3rem 0}
</style>
</head>
<body>
<nav>
  <a href="/" class="logo"><span class="logo-icon">⛓</span>BlockID</a>
  <div style="display:flex;gap:.75rem">
    <a href="/dashboard" class="btn btn-ghost">Dashboard</a>
    <a href="/docs" class="btn btn-ghost" target="_blank">API Docs</a>
  </div>
</nav>

<div class="container" style="position:relative;z-index:1">
  <h1>⛓ Chain Explorer</h1>
  <p class="sub">Inspect blocks, transactions, and cryptographic proofs. All data is public and verifiable.</p>

  <div id="loading" style="text-align:center;padding:3rem"><div class="spinner"></div><div class="text-muted" style="margin-top:1rem">Loading blockchain…</div></div>

  <div id="mainContent" style="display:none">
    <div class="stats" id="statsBar"></div>

    <div class="card">
      <div class="card-header">
        <div class="card-title">All Blocks</div>
        <button class="btn btn-ghost" style="font-size:.8rem;padding:.35rem .8rem" onclick="loadChain()">↻ Refresh</button>
      </div>
      <div class="card-body" id="blockList"></div>
    </div>

    <div id="detailPanel" class="card" style="display:none">
      <div class="card-header">
        <div class="card-title" id="detailTitle">Block Details</div>
        <button class="btn btn-ghost" style="font-size:.8rem;padding:.35rem .8rem" onclick="closeDetail()">✕ Close</button>
      </div>
      <div class="card-body" id="detailBody"></div>
    </div>
  </div>
</div>

<script>
async function loadChain() {
  try {
    const token = localStorage.getItem('blockid_token');
    const headers = token ? { 'Authorization': `Bearer ${token}` } : {};

    const [statsR, blocksR] = await Promise.all([
      fetch('/api/chain/stats', { headers }),
      fetch('/api/chain/blocks', { headers }),
    ]);

    if (!statsR.ok || !blocksR.ok) {
      document.getElementById('loading').innerHTML = '<div style="color:var(--muted);padding:2rem;text-align:center">Please <a href="/" style="color:var(--accent)">sign in</a> to view the explorer.</div>';
      return;
    }

    const stats = await statsR.json();
    const blocks = await blocksR.json();

    document.getElementById('loading').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';

    document.getElementById('statsBar').innerHTML = `
      <div class="stat"><div class="stat-label">Blocks</div><div class="stat-val accent">${stats.total_blocks}</div></div>
      <div class="stat"><div class="stat-label">Transactions</div><div class="stat-val green">${stats.total_transactions}</div></div>
      <div class="stat"><div class="stat-label">Difficulty</div><div class="stat-val purple">${stats.difficulty} zeros</div></div>
      <div class="stat"><div class="stat-label">Integrity</div><div class="stat-val ${stats.is_valid?'green':'accent'}">${stats.is_valid?'✓ Valid':'✗ Invalid'}</div></div>
      <div class="stat"><div class="stat-label">Pending Tx</div><div class="stat-val">${stats.pending_transactions}</div></div>
    `;

    document.getElementById('blockList').innerHTML = blocks.map(b => `
      <div class="block-item" onclick="showBlock(${b.index})">
        <div class="block-num">#${b.index}</div>
        <div style="flex:1;min-width:0">
          <div class="font-mono text-xs" style="color:var(--accent3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${b.hash}</div>
          <div class="text-xs text-muted" style="margin-top:.2rem">prev: ${b.previous_hash.substring(0,32)}…</div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div class="text-sm" style="font-weight:700">${b.transaction_count} txs</div>
          <div class="text-xs text-muted">${new Date(b.timestamp*1000).toLocaleString()}</div>
        </div>
        <div class="tag tag-muted text-xs" style="flex-shrink:0">nonce:${b.nonce}</div>
      </div>
    `).join('');
  } catch(e) {
    document.getElementById('loading').innerHTML = `<div style="color:var(--muted);padding:2rem;text-align:center">Error: ${e.message}</div>`;
  }
}

async function showBlock(index) {
  const token = localStorage.getItem('blockid_token');
  const headers = token ? { 'Authorization': `Bearer ${token}` } : {};
  const r = await fetch(`/api/chain/blocks/${index}`, { headers });
  if (!r.ok) return;
  const b = await r.json();

  document.getElementById('detailTitle').textContent = `Block #${index} Details`;
  document.getElementById('detailPanel').style.display = 'block';
  document.getElementById('detailBody').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem">
      <div>
        <div class="text-xs text-muted">Block Hash</div>
        <div class="hash-display">${b.hash}</div>
      </div>
      <div>
        <div class="text-xs text-muted">Previous Hash</div>
        <div class="hash-display">${b.previous_hash}</div>
      </div>
      <div>
        <div class="text-xs text-muted">Timestamp</div>
        <div class="text-sm" style="margin-top:.25rem">${new Date(b.timestamp*1000).toLocaleString()}</div>
      </div>
      <div>
        <div class="text-xs text-muted">Nonce (PoW)</div>
        <div class="font-mono text-sm" style="color:var(--accent2);margin-top:.25rem">${b.nonce}</div>
      </div>
    </div>
    <div style="font-weight:700;margin-bottom:.75rem">Transactions (${b.transactions.length})</div>
    ${b.transactions.length === 0
      ? '<div class="text-muted text-sm">Genesis block — no transactions</div>'
      : b.transactions.map(tx => `
        <div class="tx-item">
          <div class="tx-header">
            <span class="tag tag-purple">${tx.action}</span>
            <span class="font-mono text-xs text-muted">${tx.tx_id}</span>
            <span class="text-xs text-muted" style="margin-left:auto">${new Date(tx.timestamp*1000).toLocaleString()}</span>
          </div>
          <div class="text-xs text-muted">Document Hash</div>
          <div class="hash-display">${tx.document_hash}</div>
          ${tx.signature ? `<div class="text-xs text-muted">Digital Signature (truncated)</div><div class="hash-display" style="color:var(--accent2)">${tx.signature.substring(0,64)}…</div>` : ''}
        </div>
      `).join('')
    }
  `;
  document.getElementById('detailPanel').scrollIntoView({ behavior: 'smooth' });
}

function closeDetail() { document.getElementById('detailPanel').style.display = 'none'; }

loadChain();
</script>
</body>
</html>
